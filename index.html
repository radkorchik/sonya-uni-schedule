<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание Сони</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(236, 72, 153, 0.7); }
        
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        body { 
            transition: background-image 0.8s ease-in-out, background-color 0.8s ease-in-out; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-color: #fdf2f8; 
            overflow-x: hidden;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(236, 72, 153, 0.1);
        }

        #settings-menu {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.6s ease-in-out, 
                        margin 0.8s ease;
            margin-bottom: 0;
        }

        #settings-menu.is-open {
            max-height: 500px; 
            opacity: 1;
            margin-bottom: 1.25rem;
        }

        .smooth-flow {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-progress-bg {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .glass-progress-fill {
            background: linear-gradient(90deg, rgba(244,114,182,0.85) 0%, rgba(236,72,153,0.95) 100%);
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 1s linear;
        }
        
        #splash-screen {
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        #cog-icon {
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-transition {
            transition: opacity 0.3s ease-in-out;
        }

        .time-ms-font {
            font-variant-numeric: tabular-nums;
        }

        /* Плавное появление картинки */
        @keyframes fadeInImg {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-img-in {
            animation: fadeInImg 0.4s ease-out forwards;
        }
    </style>
</head>
<body id="body-bg" class="font-sans text-gray-800">
    
    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-pink-50/80 backdrop-blur-xl">
        <div class="text-6xl mb-4 animate-bounce" style="animation-duration: 2s;">🌸</div>
        <h2 class="text-3xl font-bold text-pink-500 tracking-wide animate-pulse mb-2 text-center px-4">Привет, Сонечка!</h2>
        <p id="splash-compliment" class="text-pink-400 font-medium text-lg text-center px-4 drop-shadow-sm"></p>
    </div>

    <div id="meme-modal" class="fixed inset-0 z-50 hidden flex-col bg-pink-50/90 backdrop-blur-xl p-6 items-center justify-center opacity-0 modal-transition">
        <button onclick="closeMeme()" class="absolute top-6 right-6 glass-card w-12 h-12 rounded-full flex items-center justify-center text-xl hover:scale-110 active:scale-95 transition">❌</button>
        <h2 class="text-2xl font-bold text-pink-500 mb-6 drop-shadow-sm text-center">Минутка отдыха 😹</h2>
        
        <div id="meme-content" class="w-full max-w-sm min-h-[250px] max-h-[60vh] rounded-3xl overflow-hidden shadow-lg border-2 border-white/70 mb-8 flex items-center justify-center bg-white/50 p-2">
            </div>
        
        <button onclick="loadMeme()" class="glass-card w-full max-w-sm py-4 rounded-3xl text-sm font-bold text-pink-500 shadow-sm hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
            <span>🎲</span> Показать другой мем
        </button>
    </div>

    <div id="full-schedule-modal" class="fixed inset-0 z-40 hidden flex-col bg-pink-50/85 backdrop-blur-xl p-4 overflow-y-auto opacity-0 modal-transition">
        <div class="flex justify-between items-center mb-5 mt-2">
            <h2 class="text-2xl font-bold text-pink-600 drop-shadow-sm">Всё расписание 🗓️</h2>
            <button onclick="toggleFullSchedule()" class="glass-card w-10 h-10 rounded-full flex items-center justify-center text-lg hover:scale-110 active:scale-95 transition">❌</button>
        </div>
        <div id="full-schedule-content" class="pb-10"></div>
    </div>

    <div id="main-overlay" class="p-4 pb-6 min-h-screen">
        
        <div class="flex justify-end mb-5 gap-3 smooth-flow">
            <button onclick="openMeme()" class="glass-card p-2 rounded-full shadow-sm text-xl hover:scale-110 active:scale-95 transition h-10 w-10 flex items-center justify-center">
                <span>😹</span>
            </button>
            <button onclick="toggleSettings()" class="glass-card p-2 rounded-full shadow-sm text-xl hover:scale-110 active:scale-95 transition h-10 w-10 flex items-center justify-center">
                <span id="cog-icon">⚙️</span>
            </button>
        </div>

        <div class="glass-card rounded-3xl p-4 text-center mb-5 shadow-sm smooth-flow">
            <h1 id="main-title" class="text-2xl font-bold text-pink-500 drop-shadow-sm">Привет, Сонечка! 🐈‍⬛</h1>
            <p class="text-sm text-pink-400 mt-1 font-medium" id="subtitle">Синхронизация...</p>
        </div>

        <div id="settings-menu" class="glass-card rounded-3xl shadow-sm">
            <div class="p-4">
                <h3 class="text-sm font-bold text-pink-500 mb-3 text-center">Выбери стиль фона 🌸</h3>
                
                <div class="flex overflow-x-auto gap-3 mb-4 hide-scroll snap-x py-1 px-1 scroll-smooth">
                    <button onclick="setBg('default')" class="snap-center shrink-0 h-16 w-16 rounded-xl border-2 border-white bg-pink-50 shadow-sm"></button>
                    <button onclick="setBg('cat1')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/1.jpg')"></button>
                    <button onclick="setBg('cat2')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/2.jpg')"></button>
                    <button onclick="setBg('cat3')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/3.jpg')"></button>
                    <button onclick="setBg('flowers')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/4.jpg')"></button>
                </div>

                <button id="slide-btn" onclick="toggleSlideshow()" class="w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-white/60 text-pink-500 border border-white/50 mb-2">
                    Режим слайдера: ВЫКЛ
                </button>

                <button id="ms-btn" onclick="toggleMsMode()" class="w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-white/60 text-pink-500 border border-white/50">
                    Мем-таймер (мс): ВЫКЛ
                </button>
            </div>
        </div>

        <div id="schedule-container" class="smooth-flow mb-5"></div>

        <div class="smooth-flow">
            <button onclick="toggleFullSchedule()" class="glass-card w-full py-4 rounded-3xl text-sm font-bold text-pink-500 shadow-sm hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                <span>📅</span> Посмотреть всё расписание
            </button>
        </div>

    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#FDF2F8'); 

        // --- ЛОГИКА МЕМОВ (НАДЕЖНЫЕ ССЫЛКИ GIPHY) ---
        const memeUrls = [
            'https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif', // Kitten attacking
            'https://media.giphy.com/media/GeimqsH0TLDt4tScGw/giphy.gif', // Happy dancing cat
            'https://media.giphy.com/media/Lq0h93752f6J9tijrh/giphy.gif', // Vibing cat
            'https://media.giphy.com/media/MDJgKEjy4hJbL2w4D9/giphy.gif', // Bongo cat
            'https://media.giphy.com/media/nR4L10XlJcSeQ/giphy.gif',     // Cat licking/nodding
            'https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif',     // Cute blinking cat
            'https://media.giphy.com/media/11s7Ke7jcNxCHS/giphy.gif',    // Head tilt cat
            'https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif'  // Cat rolling
        ];

        function loadMeme() {
            const container = document.getElementById('meme-content');
            // Индикатор загрузки (пока скачивается тяжелая гифка)
            container.innerHTML = '<div class="py-10 text-pink-500 font-bold animate-pulse text-sm">Ищем котика... 🐾</div>';
            
            const randomUrl = memeUrls[Math.floor(Math.random() * memeUrls.length)];
            
            // Загружаем картинку в память, и только потом показываем
            const img = new Image();
            img.src = randomUrl;
            img.className = "w-full h-auto rounded-2xl animate-img-in";
            
            img.onload = () => {
                container.innerHTML = '';
                container.appendChild(img);
            };
        }

        function openMeme() {
            const modal = document.getElementById('meme-modal');
            loadMeme();
            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            modal.classList.add('opacity-100');
            document.body.style.overflow = 'hidden';
        }

        function closeMeme() {
            const modal = document.getElementById('meme-modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                document.getElementById('meme-content').innerHTML=''; 
                document.body.style.overflow = '';
            }, 300);
        }

        // --- ЛОГИКА ЭКРАНА ПРИВЕТСТВИЯ ---
        const compliments = [
            "Ты сегодня super slay 💅",
            "Выглядишь прекрасно! 🥰",
            "Ты очень красивая! ✨"
        ];
        document.getElementById('splash-compliment').innerText = compliments[Math.floor(Math.random() * compliments.length)];

        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.visibility = 'hidden'; }, 1000);
        }, 2500);

        // --- НАСТРОЙКИ ---
        const backgrounds = {
            'default': '', 
            'cat1': './backgrounds/1.jpg',
            'cat2': './backgrounds/2.jpg',
            'cat3': './backgrounds/3.jpg',
            'flowers': './backgrounds/4.jpg'
        };

        window.onload = () => {
            Object.values(backgrounds).forEach(url => {
                if(url) { const img = new Image(); img.src = url; }
            });
        };

        let slideshowInterval = null;
        let isMsMode = false;

        function toggleSettings() {
            const menu = document.getElementById('settings-menu');
            const cog = document.getElementById('cog-icon');
            menu.classList.toggle('is-open');
            if (menu.classList.contains('is-open')) { cog.style.transform = 'rotate(180deg)'; } 
            else { cog.style.transform = 'rotate(0deg)'; }
        }

        function setBg(key, saveToCloud = true) {
            const body = document.getElementById('body-bg');
            if (key === 'default' || !backgrounds[key]) { body.style.backgroundImage = 'none'; } 
            else { body.style.backgroundImage = `url('${backgrounds[key]}')`; }
            if (saveToCloud) { window.Telegram.WebApp.CloudStorage.setItem('selectedBg', key); }
        }

        function toggleSlideshow(saveToCloud = true) {
            const btn = document.getElementById('slide-btn');
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
                btn.innerText = 'Режим слайдера: ВЫКЛ';
                btn.className = 'w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-white/60 text-pink-500 border border-white/50 mb-2';
                if (saveToCloud) window.Telegram.WebApp.CloudStorage.setItem('slideshowState', 'off');
            } else {
                let keys = Object.keys(backgrounds).filter(k => k !== 'default');
                let i = 0;
                slideshowInterval = setInterval(() => {
                    setBg(keys[i], false);
                    i = (i + 1) % keys.length;
                }, 7000); 
                btn.innerText = 'Режим слайдера: ВКЛ';
                btn.className = 'w-full py-2 rounded-2xl text-xs font-bold uppercase bg-pink-500 text-white shadow-lg border border-pink-400 mb-2';
                if (saveToCloud) window.Telegram.WebApp.CloudStorage.setItem('slideshowState', 'on');
                setBg(keys[0], false);
            }
        }

        function toggleMsMode(saveToCloud = true) {
            const btn = document.getElementById('ms-btn');
            isMsMode = !isMsMode;
            if (!isMsMode) {
                btn.innerText = 'Мем-таймер (мс): ВЫКЛ';
                btn.className = 'w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-white/60 text-pink-500 border border-white/50';
                if (saveToCloud) window.Telegram.WebApp.CloudStorage.setItem('msState', 'off');
            } else {
                btn.innerText = 'Мем-таймер (мс): ВКЛ';
                btn.className = 'w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-pink-500 text-white shadow-lg border border-pink-400';
                if (saveToCloud) window.Telegram.WebApp.CloudStorage.setItem('msState', 'on');
            }
            updateFastTimers(); 
        }

        window.Telegram.WebApp.CloudStorage.getItems(['selectedBg', 'slideshowState', 'msState'], function(error, values) {
            if (!error && values) {
                if (values.selectedBg) setBg(values.selectedBg, false);
                if (values.slideshowState === 'on') toggleSlideshow(false); 
                if (values.msState === 'on') toggleMsMode(false);
            }
        });

        const SCHEDULE = {
            'ODD': {
                1: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Основы теории коммуникации', room: 'К-159', teacher: 'Куренова Д.Г.'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Имиджмейкинг в системе связей с общественностью', room: 'К-371', teacher: 'Бондарева В.В.'},
                    {num: 5, start: '15:00', end: '16:30', type: 'L', subj: 'Методы исследований в рекламе и PR', room: 'К-159', teacher: 'Кривошеева Е.В.'}
                ],
                2: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Теория и практика связей с общественностью', room: 'К-235', teacher: 'Жильцова М.С.'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Основы теории коммуникации', room: 'К-367', teacher: 'Куренова Д.Г.'}
                ],
                3: [
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Кросс-культурные коммуникации в рекламе', room: 'К-323', teacher: 'Жильцова М.С.'},
                    {num: 3, start: '11:20', end: '12:50', type: 'P', subj: 'Деловые коммуникации в рекламной и PR-деятельности', room: 'К-323', teacher: 'Губин В.А.'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Методы исследований в рекламе и PR', room: 'К-323', teacher: 'Кривошеева Е.В.'}
                ],
                4: [],
                5: [
                    {num: 1, start: '08:00', end: '09:30', type: 'P', subj: 'Физическая культура и спорт', room: 'Ф-Спорткомплекс', teacher: 'Коновалова М.А.'},
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Иностранный язык', room: 'А-102 / А-402', teacher: 'Лытнева В.В. / Городова Е.А.'},
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Правовое обеспечение профессиональной деятельности', room: 'А-536', teacher: 'Халимонова Д.А.'}
                ]
            },
            'EVEN': {
                1: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Основы теории коммуникации', room: 'К-159', teacher: 'Куренова Д.Г.'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Имиджмейкинг в системе связей с общественностью', room: 'К-371', teacher: 'Бондарева В.В.'},
                    {num: 5, start: '15:00', end: '16:30', type: 'L', subj: 'Методы исследований в рекламе и PR', room: 'К-159', teacher: 'Кривошеева Е.В.'}
                ],
                2: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Кросс-культурные коммуникации в рекламе', room: 'К-235', teacher: 'Жильцова М.С.'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Основы теории коммуникации', room: 'К-367', teacher: 'Куренова Д.Г.'}
                ],
                3: [
                    {num: 1, start: '08:00', end: '09:30', type: 'P', subj: 'Теория и практика связей с общественностью', room: 'К-344', teacher: 'Жильцова М.С.'},
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Кросс-культурные коммуникации в рекламе', room: 'К-323', teacher: 'Жильцова М.С.'},
                    {num: 3, start: '11:20', end: '12:50', type: 'P', subj: 'Деловые коммуникации в рекламной и PR-деятельности', room: 'К-323', teacher: 'Губин В.А.'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Методы исследований в рекламе и PR', room: 'К-323', teacher: 'Кривошеева Е.В.'}
                ],
                4: [
                    {num: 4, start: '13:20', end: '14:50', type: 'L', subj: 'Имиджмейкинг в системе связей с общественностью', room: 'К-247', teacher: 'Бондарева В.В.'},
                    {num: 5, start: '15:00', end: '16:30', type: 'L', subj: 'Деловые коммуникации в рекламной и PR-деятельности', room: 'К-203', teacher: 'Губин В.А.'}
                ],
                5: [
                    {num: 1, start: '08:00', end: '09:30', type: 'P', subj: 'Физическая культура и спорт', room: 'Ф-Спорткомплекс', teacher: 'Коновалова М.А.'},
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Правовое обеспечение профессиональной деятельности', room: 'А-610', teacher: 'Халимонова Д.А.'},
                    {num: 3, start: '11:20', end: '12:50', type: 'P', subj: 'Иностранный язык', room: 'А-421 / А-512', teacher: 'Городова Е.А. / Лытнева В.В.'}
                ]
            }
        };

        const dayNames = {1: 'Понедельник', 2: 'Вторник', 3: 'Среда', 4: 'Четверг', 5: 'Пятница', 6: 'Суббота'};
        
        function renderFullSchedule() {
            let html = '';
            ['ODD', 'EVEN'].forEach(weekKey => {
                const weekName = weekKey === 'ODD' ? 'Нечетная неделя (1, 3...)' : 'Четная неделя (2, 4...)';
                html += `<h3 class="text-lg font-bold text-pink-600 mb-4 mt-2 sticky top-0 bg-white/40 backdrop-blur-md py-2 px-4 rounded-2xl z-10 shadow-sm border border-white/50">${weekName}</h3>`;

                Object.keys(SCHEDULE[weekKey]).forEach(dayStr => {
                    const dayNum = parseInt(dayStr);
                    const classes = SCHEDULE[weekKey][dayNum];
                    
                    html += `<div class="mb-6"><h4 class="text-md font-bold text-gray-800 ml-2 mb-3 drop-shadow-sm font-bold uppercase tracking-wider text-[10px] text-gray-500">${dayNames[dayNum]}</h4><div class="space-y-3">`;
                    
                    if (classes.length > 0) {
                        classes.forEach(cls => {
                            const typeText = cls.type === 'L' ? 'Лекция' : 'Практика';
                            html += `
                                <div class="glass-card rounded-2xl p-4 flex items-center justify-between">
                                    <div class="pr-2 flex-1">
                                        <h5 class="text-sm font-bold text-gray-800 leading-tight mb-2">${cls.subj}</h5>
                                        <div class="flex flex-wrap gap-x-3 gap-y-1">
                                            <p class="text-[11px] text-gray-700 font-medium">🚪 ${cls.room}</p>
                                            <p class="text-[11px] text-gray-700 font-medium">👤 ${cls.teacher}</p>
                                            <p class="text-[11px] text-pink-600 font-bold">${typeText}</p>
                                        </div>
                                    </div>
                                    <div class="text-right whitespace-nowrap pl-2">
                                        <p class="text-[11px] font-bold text-pink-600 bg-white/70 px-2 py-1 rounded-full border border-white/50 shadow-sm">${cls.start} - ${cls.end}</p>
                                    </div>
                                </div>`;
                        });
                    } else {
                        html += `
                            <div class="glass-card rounded-2xl p-5 flex flex-col items-center justify-center text-center opacity-90">
                                <div class="text-2xl mb-1">✨</div>
                                <p class="text-sm font-bold text-gray-800 drop-shadow-sm">Отдых!</p>
                                <p class="text-[11px] text-gray-600 font-medium mt-1">Пар нет, можно заниматься своими делами 🐈‍⬛</p>
                            </div>`;
                    }
                    html += `</div></div>`;
                });
            });
            document.getElementById('full-schedule-content').innerHTML = html;
        }

        function toggleFullSchedule() {
            const modal = document.getElementById('full-schedule-modal');
            if (modal.classList.contains('hidden')) {
                if (!modal.dataset.rendered) { renderFullSchedule(); modal.dataset.rendered = 'true'; }
                modal.classList.remove('hidden');
                void modal.offsetWidth; 
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                document.body.style.overflow = 'hidden';
            } else {
                modal.classList.remove('opacity-100');
                modal.classList.add('opacity-0');
                setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 500);
            }
        }

        function getMoscowTime() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Moscow"})); }

        function getWeekType(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            return (weekNo % 2 === 0) ? 'EVEN' : 'ODD';
        }

        function parseTimeStr(timeStr, baseDate) {
            const [hours, minutes] = timeStr.split(':');
            const d = new Date(baseDate);
            d.setHours(parseInt(hours), parseInt(minutes), 0, 0);
            return d;
        }

        function updateFastTimers() {
            const now = getMoscowTime().getTime();
            document.querySelectorAll('.time-left-display').forEach(el => {
                const end = parseInt(el.dataset.endTime);
                const prefix = el.dataset.prefix;
                let diffMs = end - now;
                if (diffMs < 0) diffMs = 0;
                
                if (isMsMode) {
                    el.innerText = `${prefix}${diffMs} мс`;
                } else {
                    const totalMins = Math.ceil(diffMs / 60000);
                    const h = Math.floor(totalMins / 60);
                    const m = totalMins % 60;
                    if (h > 0) {
                        el.innerText = `${prefix}${h} ч ${m} мин`;
                    } else {
                        el.innerText = `${prefix}${m} мин`;
                    }
                }
            });
        }

        setInterval(updateFastTimers, 50);

        function updateUI() {
            const nowTime = getMoscowTime();
            const weekType = getWeekType(nowTime);
            const dayOfWeek = nowTime.getDay(); 
            document.getElementById('subtitle').innerText = `Сегодня ${nowTime.toLocaleDateString('ru-RU')} • ${weekType === 'EVEN' ? 'Четная' : 'Нечетная'} неделя`;
            const todayClasses = SCHEDULE[weekType][dayOfWeek] || [];
            const container = document.getElementById('schedule-container');
            
            if (todayClasses.length === 0) {
                container.innerHTML = `<div class="glass-card rounded-3xl p-8 text-center"><div class="text-4xl mb-3">🌸</div><h2 class="text-xl font-bold text-gray-800 mb-2">Пар больше нет!</h2><p class="text-gray-600 text-sm font-medium">Можно отдыхать. Хорошего дня!</p></div>`;
                return;
            }

            let currentClass = null; let nextClasses = []; let isBreak = false; let breakEndTime = null;

            todayClasses.forEach((cls, index) => {
                const start = parseTimeStr(cls.start, nowTime); const end = parseTimeStr(cls.end, nowTime);
                if (nowTime >= start && nowTime <= end) { currentClass = cls; }
                else if (nowTime < start) {
                    nextClasses.push(cls);
                    if (index > 0) {
                        const prevEnd = parseTimeStr(todayClasses[index-1].end, nowTime);
                        if (nowTime > prevEnd && nowTime < start && !currentClass) { isBreak = true; breakEndTime = start; }
                    } else if (!currentClass && index === 0) { isBreak = true; breakEndTime = start; }
                }
            });

            let html = '';
            if (!currentClass && nextClasses.length === 0) {
                container.innerHTML = `<div class="glass-card rounded-3xl p-8 text-center"><div class="text-4xl mb-3">✨</div><h2 class="text-xl font-bold text-gray-800 mb-2">Учеба на сегодня всё!</h2><p class="text-gray-600 text-sm font-medium">Все пары закончились. Приятного вечера!</p></div>`;
                return;
            }

            if (currentClass) {
                const start = parseTimeStr(currentClass.start, nowTime); const end = parseTimeStr(currentClass.end, nowTime);
                const totalDuration = end - start; const passed = nowTime - start;
                let percentage = Math.max(0, Math.min(100, (passed / totalDuration) * 100)); 
                const typeText = currentClass.type === 'L' ? 'Лекция' : 'Практика';
                
                html += `
                    <div class="glass-card rounded-3xl p-5 mb-5 relative overflow-hidden">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold text-pink-500 uppercase tracking-wider">Идет пара 🐾</span>
                            <span class="text-[11px] font-bold bg-white/70 text-pink-600 px-2 py-1 rounded-full border border-white/50">${currentClass.start} - ${currentClass.end}</span>
                        </div>
                        <h2 class="text-lg font-bold text-gray-800 mb-2 drop-shadow-sm">${currentClass.subj}</h2>
                        <div class="flex flex-col gap-1 mb-4">
                            <p class="text-xs text-gray-700 font-medium">👤 ${currentClass.teacher}</p>
                            <p class="text-xs text-gray-700 font-medium">🚪 ${currentClass.room} • ${typeText}</p>
                        </div>
                        <div class="w-full glass-progress-bg rounded-full h-3 mb-1 overflow-hidden"><div class="glass-progress-fill h-3 rounded-full" style="width: ${percentage}%"></div></div>
                        <div class="text-right text-[10px] text-pink-600 font-bold time-ms-font time-left-display" data-prefix="Осталось " data-end-time="${end.getTime()}"></div>
                    </div>`;
            } 
            else if (isBreak && breakEndTime) {
                html += `<div class="glass-card rounded-3xl p-5 mb-5 text-center"><h2 class="text-lg font-bold text-gray-800 mb-1">Перерыв ☕</h2><p class="text-sm text-gray-700 font-medium"><span class="text-pink-600 font-bold time-ms-font time-left-display" data-prefix="Пары начнутся через " data-end-time="${breakEndTime.getTime()}"></span></p></div>`;
            }

            if (nextClasses.length > 0) {
                html += `<h3 class="text-md font-bold text-pink-600 drop-shadow-sm ml-2 mb-3 mt-2 font-bold uppercase tracking-widest text-[10px]">Дальше по расписанию:</h3><div class="space-y-3">`;
                nextClasses.forEach((cls) => {
                    const typeText = cls.type === 'L' ? 'Лекция' : 'Практика';
                    html += `
                        <div class="glass-card rounded-2xl p-4 flex items-center justify-between">
                            <div class="pr-2 flex-1">
                                <h4 class="text-sm font-bold text-gray-800 drop-shadow-sm leading-tight mb-1">${cls.subj}</h4>
                                <div class="flex flex-col gap-0.5 mt-1">
                                    <p class="text-[11px] text-gray-700 font-medium">👤 ${cls.teacher}</p>
                                    <p class="text-[11px] text-gray-600">🚪 ${cls.room} • ${typeText}</p>
                                </div>
                            </div>
                            <div class="text-right whitespace-nowrap pl-2">
                                <p class="text-[11px] font-bold text-pink-600 bg-white/70 px-2 py-1 rounded-full border border-white/50">${cls.start} - ${cls.end}</p>
                            </div>
                        </div>`;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
            updateFastTimers(); 
        }
        
        updateUI(); setInterval(updateUI, 1000);
    </script>
</body>
</html>
