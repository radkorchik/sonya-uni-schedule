<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание Сони</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Прячем скроллбар для красоты */
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-pink-50 font-sans text-gray-800 p-4">

    <div class="text-center mt-4 mb-6">
        <h1 class="text-2xl font-bold text-pink-500">Привет, Соня! 🐈</h1>
        <p class="text-sm text-pink-400 mt-1">Хорошего учебного дня 🌸</p>
    </div>

    <div class="bg-white rounded-3xl p-5 shadow-sm border border-pink-100 mb-4 relative overflow-hidden">
        <div class="flex justify-between items-center mb-3">
            <span class="text-xs font-bold text-pink-400 uppercase tracking-wider">Идет пара 🐾</span>
            <span class="text-xs font-bold bg-pink-100 text-pink-500 px-2 py-1 rounded-full">11:20 - 12:50</span>
        </div>
        
        <h2 class="text-lg font-bold mb-1">Основы теории коммуникации</h2>
        <p class="text-sm text-gray-500 mb-4">Ауд: К-159 • Лекция</p>

        <div class="w-full bg-pink-50 rounded-full h-3 mb-1">
            <div class="bg-gradient-to-r from-pink-300 to-pink-500 h-3 rounded-full" style="width: 65%"></div>
        </div>
        <div class="text-right text-xs text-pink-400 font-medium">
            Осталось 40 мин
        </div>
    </div>

    <h3 class="text-md font-bold text-gray-700 ml-2 mb-3">Дальше по расписанию:</h3>
    
    <div class="space-y-3">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-pink-50 flex items-center justify-between opacity-70">
            <div>
                <h4 class="text-sm font-bold text-gray-700">Имиджмейкинг в PR</h4>
                <p class="text-xs text-gray-500">К-371 • Практика</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-gray-600">13:20</p>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-pink-50 flex items-center justify-between opacity-70">
            <div>
                <h4 class="text-sm font-bold text-gray-700">Методы исследований</h4>
                <p class="text-xs text-gray-500">К-159 • Лекция</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-gray-600">15:00</p>
            </div>
        </div>
    </div>

    <script>
        // Сообщаем Телеграму, что приложение готово к отображению
        window.Telegram.WebApp.ready();
        // Можно развернуть приложение на весь экран
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
