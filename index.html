<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание Сони</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- ТОНКИЙ РОЗОВЫЙ СКРОЛЛБАР --- */
        /* Он будет появляться автоматически только при переполнении экрана */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(236, 72, 153, 0.7); }
        
        /* Прячем скроллбар ТОЛЬКО для горизонтального меню картинок, чтобы можно было свайпать */
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Плавность для смены фонов (сделали медленнее: 0.8s) */
        body { 
            transition: background-image 0.8s ease-in-out, background-color 0.8s ease-in-out; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-color: #fdf2f8; 
            overflow-x: hidden;
        }
        
        /* ЭФФЕКТ ЖИДКОГО СТЕКЛА */
        .glass-card { 
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(236, 72, 153, 0.1);
        }

        /* Плавное раскрытие меню настроек (замедлено и смягчено) */
        #settings-menu {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.6s ease-in-out, 
                        margin 0.8s ease;
            margin-bottom: 0;
        }

        #settings-menu.is-open {
            max-height: 500px; 
            opacity: 1;
            margin-bottom: 1.25rem; /* Равномерный отступ mb-5 */
        }

        /* Общая плавность (увеличена до 0.8s) */
        .smooth-flow {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Анимация появления блоков (медленный fade-in) */
        @keyframes slowFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slow-fade {
            animation: slowFadeIn 0.8s ease-out forwards;
        }

        .glass-progress-bg {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .glass-progress-fill {
            background: linear-gradient(90deg, rgba(244,114,182,0.85) 0%, rgba(236,72,153,0.95) 100%);
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 1s linear;
        }
        
        /* Экран приветствия */
        #splash-screen {
            transition: opacity 1s ease-in-out, visibility 1s;
        }
    </style>
</head>
<body id="body-bg" class="font-sans text-gray-800">
    
    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-pink-50/80 backdrop-blur-xl">
        <div class="text-6xl mb-4 animate-bounce" style="animation-duration: 2s;">🌸</div>
        <h2 class="text-2xl font-bold text-pink-500 tracking-wide animate-pulse">Привет, Сонечка!</h2>
    </div>

    <div id="main-overlay" class="p-4 pb-6 min-h-screen">
        
        <div class="flex justify-end mb-5 smooth-flow">
            <button onclick="toggleSettings()" class="glass-card p-2 rounded-full shadow-sm text-xl hover:scale-110 active:scale-95 transition h-10 w-10 flex items-center justify-center">⚙️</button>
        </div>

        <div class="glass-card rounded-3xl p-4 text-center mb-5 shadow-sm smooth-flow">
            <h1 id="main-title" class="text-2xl font-bold text-pink-500 drop-shadow-sm">Мое расписание 🐈‍⬛</h1>
            <p class="text-sm text-pink-400 mt-1 font-medium" id="subtitle">Синхронизация...</p>
        </div>

        <div id="settings-menu" class="glass-card rounded-3xl shadow-sm">
            <div class="p-4">
                <h3 class="text-sm font-bold text-pink-500 mb-3 text-center">Выбери стиль фона 🌸</h3>
                
                <div class="flex overflow-x-auto gap-3 mb-4 hide-scroll snap-x py-1 px-1 scroll-smooth">
                    <button onclick="setBg('default')" class="snap-center shrink-0 h-16 w-16 rounded-xl border-2 border-white bg-pink-50 shadow-sm"></button>
                    <button onclick="setBg('cat1')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/1.jpg')"></button>
                    <button onclick="setBg('cat2')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/2.jpg')"></button>
                    <button onclick="setBg('cat3')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/3.jpg')"></button>
                    <button onclick="setBg('flowers')" class="snap-center shrink-0 h-16 w-16 rounded-xl bg-cover bg-center shadow-sm border border-white/50" style="background-image: url('./backgrounds/4.jpg')"></button>
                </div>

                <button id="slide-btn" onclick="toggleSlideshow()" class="w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-white/60 text-pink-500 border border-white/50">
                    Режим слайдера: ВЫКЛ
                </button>
            </div>
        </div>

        <div id="schedule-container" class="smooth-flow"></div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#FDF2F8'); 

        // ЛОГИКА ЭКРАНА ПРИВЕТСТВИЯ
        // Через 1.5 секунды после загрузки начинаем плавно растворять заставку
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            // А через секунду после начала растворения убираем её физически, чтобы можно было нажимать кнопки
            setTimeout(() => {
                splash.style.visibility = 'hidden';
            }, 1000);
        }, 1500);

        const backgrounds = {
            'default': '', 
            'cat1': './backgrounds/1.jpg',
            'cat2': './backgrounds/2.jpg',
            'cat3': './backgrounds/3.jpg',
            'flowers': './backgrounds/4.jpg'
        };

        window.onload = () => {
            Object.values(backgrounds).forEach(url => {
                if(url) {
                    const img = new Image();
                    img.src = url;
                }
            });
        };

        let slideshowInterval = null;

        function toggleSettings() {
            const menu = document.getElementById('settings-menu');
            menu.classList.toggle('is-open');
        }

        function setBg(key, saveToCloud = true) {
            const body = document.getElementById('body-bg');
            if (key === 'default' || !backgrounds[key]) {
                body.style.backgroundImage = 'none';
            } else {
                body.style.backgroundImage = `url('${backgrounds[key]}')`;
            }
            if (saveToCloud) {
                window.Telegram.WebApp.CloudStorage.setItem('selectedBg', key);
            }
        }

        function toggleSlideshow(saveToCloud = true) {
            const btn = document.getElementById('slide-btn');
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
                btn.innerText = 'Режим слайдера: ВЫКЛ';
                btn.className = 'w-full py-2 rounded-2xl text-xs font-bold uppercase tracking-widest transition duration-500 bg-white/60 text-pink-500 border border-white/50';
                if (saveToCloud) window.Telegram.WebApp.CloudStorage.setItem('slideshowState', 'off');
            } else {
                let keys = Object.keys(backgrounds).filter(k => k !== 'default');
                let i = 0;
                slideshowInterval = setInterval(() => {
                    setBg(keys[i], false);
                    i = (i + 1) % keys.length;
                }, 7000); 
                btn.innerText = 'Режим слайдера: ВКЛ';
                btn.className = 'w-full py-2 rounded-2xl text-xs font-bold uppercase bg-pink-500 text-white shadow-lg border border-pink-400';
                if (saveToCloud) window.Telegram.WebApp.CloudStorage.setItem('slideshowState', 'on');
                setBg(keys[0], false);
            }
        }

        window.Telegram.WebApp.CloudStorage.getItems(['selectedBg', 'slideshowState'], function(error, values) {
            if (!error && values) {
                if (values.selectedBg) setBg(values.selectedBg, false);
                if (values.slideshowState === 'on') toggleSlideshow(false); 
            }
        });

        const SCHEDULE = {
            'ODD': {
                1: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Основы теории коммуникации', room: 'К-159'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Имиджмейкинг в PR', room: 'К-371'},
                    {num: 5, start: '15:00', end: '16:30', type: 'L', subj: 'Методы исследований', room: 'К-159'}
                ],
                2: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Теория и практика связей с общественностью', room: 'К-235'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Основы теории коммуникации', room: 'К-367'}
                ],
                3: [
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Кросс-культурные коммуникации', room: 'К-323'},
                    {num: 3, start: '11:20', end: '12:50', type: 'P', subj: 'Деловые коммуникации в PR', room: 'К-323'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Методы исследований в рекламе и PR', room: 'К-323'}
                ],
                4: [],
                5: [
                    {num: 1, start: '08:00', end: '09:30', type: 'P', subj: 'Физическая культура', room: 'Ф-Спорткомплекс'},
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Иностранный язык', room: 'A-102 / A-402'},
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Правовое обеспечение', room: 'A-536'}
                ]
            },
            'EVEN': {
                1: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Основы теории коммуникации', room: 'К-159'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Имиджмейкинг в PR', room: 'К-371'},
                    {num: 5, start: '15:00', end: '16:30', type: 'L', subj: 'Методы исследований', room: 'К-159'}
                ],
                2: [
                    {num: 3, start: '11:20', end: '12:50', type: 'L', subj: 'Кросс-культурные коммуникации', room: 'К-235'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Основы теории коммуникации', room: 'К-367'}
                ],
                3: [
                    {num: 1, start: '08:00', end: '09:30', type: 'P', subj: 'Теория и практика связей с общественностью', room: 'К-344'},
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Кросс-культурные коммуникации', room: 'К-323'},
                    {num: 3, start: '11:20', end: '12:50', type: 'P', subj: 'Деловые коммуникации в PR', room: 'К-323'},
                    {num: 4, start: '13:20', end: '14:50', type: 'P', subj: 'Методы исследований в рекламе и PR', room: 'К-323'}
                ],
                4: [
                    {num: 4, start: '13:20', end: '14:50', type: 'L', subj: 'Имиджмейкинг в PR', room: 'К-247'},
                    {num: 5, start: '15:00', end: '16:30', type: 'L', subj: 'Деловые коммуникации в PR', room: 'К-203'}
                ],
                5: [
                    {num: 1, start: '08:00', end: '09:30', type: 'P', subj: 'Физическая культура', room: 'Ф-Спорткомплекс'},
                    {num: 2, start: '09:40', end: '11:10', type: 'P', subj: 'Правовое обеспечение', room: 'A-610'},
                    {num: 3, start: '11:20', end: '12:50', type: 'P', subj: 'Иностранный язык', room: 'A-421 / A-512'}
                ]
            }
        };

        function getMoscowTime() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Moscow"}));
        }

        function getWeekType(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            return (weekNo % 2 === 0) ? 'EVEN' : 'ODD';
        }

        function parseTimeStr(timeStr, baseDate) {
            const [hours, minutes] = timeStr.split(':');
            const d = new Date(baseDate);
            d.setHours(parseInt(hours), parseInt(minutes), 0, 0);
            return d;
        }

        function updateUI() {
            const now = getMoscowTime();
            const weekType = getWeekType(now);
            const dayOfWeek = now.getDay(); 
            
            document.getElementById('subtitle').innerText = `Сегодня ${now.toLocaleDateString('ru-RU')} • ${weekType === 'EVEN' ? 'Четная' : 'Нечетная'} неделя`;

            const todayClasses = SCHEDULE[weekType][dayOfWeek] || [];
            const container = document.getElementById('schedule-container');
            
            if (todayClasses.length === 0) {
                container.innerHTML = `
                    <div class="glass-card rounded-3xl p-8 text-center mb-5 animate-slow-fade">
                        <div class="text-4xl mb-3">🌸</div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2">Пар больше нет!</h2>
                        <p class="text-gray-600 text-sm font-medium">Можно отдыхать и заниматься своими делами. Хорошего дня!</p>
                    </div>`;
                return;
            }

            let currentClass = null;
            let nextClasses = [];
            let isBreak = false;
            let breakEndTime = null;

            todayClasses.forEach((cls, index) => {
                const start = parseTimeStr(cls.start, now);
                const end = parseTimeStr(cls.end, now);

                if (now >= start && now <= end) {
                    currentClass = cls;
                } else if (now < start) {
                    nextClasses.push(cls);
                    if (index > 0) {
                        const prevEnd = parseTimeStr(todayClasses[index-1].end, now);
                        if (now > prevEnd && now < start && !currentClass) {
                            isBreak = true;
                            breakEndTime = start;
                        }
                    } else if (!currentClass && index === 0) {
                        isBreak = true; 
                        breakEndTime = start;
                    }
                }
            });

            let html = '';

            if (!currentClass && nextClasses.length === 0) {
                container.innerHTML = `
                    <div class="glass-card rounded-3xl p-8 text-center mb-5 animate-slow-fade">
                        <div class="text-4xl mb-3">✨</div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2">Учеба на сегодня всё!</h2>
                        <p class="text-gray-600 text-sm font-medium">Все пары закончились. Приятного вечера!</p>
                    </div>`;
                return;
            }

            if (currentClass) {
                const start = parseTimeStr(currentClass.start, now);
                const end = parseTimeStr(currentClass.end, now);
                const totalDuration = end - start;
                const passed = now - start;
                let percentage = (passed / totalDuration) * 100;
                percentage = Math.max(0, Math.min(100, percentage)); 
                
                const minsLeft = Math.ceil((end - now) / 60000);
                const typeText = currentClass.type === 'L' ? 'Лекция' : 'Практика';

                html += `
                    <div class="glass-card rounded-3xl p-5 mb-5 relative overflow-hidden animate-slow-fade">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-pink-500 uppercase tracking-wider">Идет пара 🐾</span>
                            <span class="text-xs font-bold bg-white/70 text-pink-600 px-2 py-1 rounded-full border border-white/50">${currentClass.start} - ${currentClass.end}</span>
                        </div>
                        <h2 class="text-lg font-bold text-gray-800 mb-1 drop-shadow-sm">${currentClass.subj}</h2>
                        <p class="text-sm text-gray-700 mb-4 font-medium">Ауд: ${currentClass.room} • ${typeText}</p>

                        <div class="w-full glass-progress-bg rounded-full h-3 mb-1 overflow-hidden">
                            <div class="glass-progress-fill h-3 rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        <div class="text-right text-xs text-pink-600 font-bold drop-shadow-sm">Осталось ${minsLeft} мин</div>
                    </div>`;
            } 
            else if (isBreak && breakEndTime) {
                const minsLeft = Math.ceil((breakEndTime - now) / 60000);
                html += `
                    <div class="glass-card rounded-3xl p-5 mb-5 text-center animate-slow-fade">
                        <h2 class="text-lg font-bold text-gray-800 mb-1">Перерыв ☕</h2>
                        <p class="text-sm text-gray-700 font-medium">Следующая пара начнется через <span class="text-pink-600 font-bold">${minsLeft} мин</span></p>
                    </div>`;
            }

            if (nextClasses.length > 0) {
                html += `<h3 class="text-md font-bold text-pink-600 drop-shadow-sm ml-2 mb-3 mt-2 animate-slow-fade">Дальше по расписанию:</h3><div class="space-y-3">`;
                
                nextClasses.forEach((cls, index) => {
                    const typeText = cls.type === 'L' ? 'Лекция' : 'Практика';
                    // Добавляем небольшую задержку появления для каждой следующей карточки
                    const delay = index * 0.15;
                    html += `
                        <div class="glass-card rounded-2xl p-4 flex items-center justify-between animate-slow-fade" style="animation-delay: ${delay}s; animation-fill-mode: both;">
                            <div class="pr-4">
                                <h4 class="text-sm font-bold text-gray-800 drop-shadow-sm">${cls.subj}</h4>
                                <p class="text-xs text-gray-700 font-medium">${cls.room} • ${typeText}</p>
                            </div>
                            <div class="text-right whitespace-nowrap">
                                <p class="text-sm font-bold text-pink-600">${cls.start}</p>
                            </div>
                        </div>`;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        updateUI();
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
